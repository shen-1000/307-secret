<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>307 Secret</title>

<style>
body {
    background-color: black;
    color: #00ff99;
    font-family: monospace;
    text-align: center;
    padding-top: 120px;
    transition: background-color 0.2s;
}

h1 {
    color: white;
    margin-bottom: 10px;
}

input {
    padding: 10px;
    font-size: 18px;
    background-color: black;
    color: #00ff99;
    border: 1px solid #00ff99;
}

button {
    padding: 10px;
    font-size: 18px;
    cursor: pointer;
    background-color: black;
    color: #00ff99;
    border: 1px solid #00ff99;
}

button:hover {
    background-color: #00ff99;
    color: black;
}

#message {
    margin-top: 20px;
    min-height: 30px;
}

#photo {
    margin-top: 30px;
    display: none;
    width: 300px;
    border: 2px solid #00ff99;
}
</style>
</head>

<body>

<h1>請在畢業紀念冊尋找隱藏訊息，如果有英文請輸入小寫</h1>

<input type="password" id="password" placeholder="Enter password">
<button onclick="checkPassword()">Enter</button>

<p id="message"></p>

<img id="photo" src="photo.jpg">

<script>
var insults = [
    "密碼錯誤。這樣也想畢業？",
    "再試一次吧，偵探先生。",
    "這都猜不到？",
    "認真點啦。",
    "提示就在你眼前。",
    "你確定你有翻紀念冊嗎？"
];

var wrongCount = 0;
var locked = false;

// 讓 Enter 可以送出
document.getElementById("password").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        checkPassword();
    }
});

function flashEffect() {
    document.body.style.backgroundColor = "white";
    setTimeout(function() {
        document.body.style.backgroundColor = "black";
    }, 100);
}

function lockSystem() {
    locked = true;
    var message = document.getElementById("message");
    message.innerHTML = "嘗試太多次。系統鎖定 5 秒。";
    message.style.color = "orange";

    setTimeout(function() {
        locked = false;
        wrongCount = 0;
        message.innerHTML = "可以再試一次了。";
        message.style.color = "#00ff99";
    }, 5000);
}

function checkPassword() {

    if (locked) return;

    var input = document.getElementById("password").value;
    var message = document.getElementById("message");
    var photo = document.getElementById("photo");

    if (input === "mavis") {

        flashEffect();

        message.innerHTML = "Access Granted.";
        message.style.color = "#00ff99";
        photo.style.display = "block";

    } else {

        wrongCount++;

        var randomIndex = Math.floor(Math.random() * insults.length);
        message.innerHTML = insults[randomIndex];
        message.style.color = "red";
        photo.style.display = "none";

        if (wrongCount >= 3) {
            lockSystem();
        }
    }
}
</script>

</body>
</html>
